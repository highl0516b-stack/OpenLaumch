services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: openlaunch-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      PORT: 4000
      HOSTNAME: 0.0.0.0
      OPENLAUNCH_AI_PROVIDER: local
      OPENLAUNCH_MCP_MODE: sandbox
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openlaunch-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      OPENLAUNCH_API_URL: http://api:4000
      OPENLAUNCH_AI_PROVIDER: local
      OPENLAUNCH_MCP_MODE: sandbox
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s