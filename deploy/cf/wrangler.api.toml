name = "openlaunch-api"
main = "workers/api/src/index.ts"
compatibility_date = "2024-12-01"

[vars]
OPENLAUNCH_MCP_MODE = "sandbox"
OPENLAUNCH_TENANT_ID = "production"

[[kv_namespaces]]
binding = "CONFIG_CACHE"
id = "CONFIG_CACHE_ID"

[[kv_namespaces]]
binding = "SESSIONS"
id = "SESSIONS_ID"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "RATE_LIMIT_ID"

[[d1_databases]]
binding = "DB"
database_name = "openlaunch-db"
database_id = "DB_ID"

[[durable_objects.bindings]]
class_name = "AgentSession"
name = "AGENT_SESSION"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "openlaunch-uploads"

[[mcp]]
enabled = true
