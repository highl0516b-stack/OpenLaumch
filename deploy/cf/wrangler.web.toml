name = "openlaunch-web"
main = "workers/web/src/index.ts"
compatibility_date = "2024-12-01"

[site]
bucket = "./public"

[[routes]]
pattern = "openlaunch.example.com/*"

[[kv_namespaces]]
binding = "CONFIG_CACHE"
id = "CONFIG_CACHE_ID_HERE"

[[kv_namespaces]]
binding = "SESSIONS"
id = "SESSIONS_ID_HERE"

[[d1_databases]]
binding = "DB"
database_name = "openlaunch-db"
database_id = "DB_ID_HERE"

[[vectorize]]
binding = "VECTOR_INDEX"
index_name = "openlaunch-embeddings"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "openlaunch-uploads"
