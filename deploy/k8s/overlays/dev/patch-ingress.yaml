apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openlaunch-web
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
spec:
  tls:
    - hosts:
        - dev.openlaunch.example.com
      secretName: openlaunch-dev-tls
  rules:
    - host: dev.openlaunch.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openlaunch-web
                port:
                  number: 80