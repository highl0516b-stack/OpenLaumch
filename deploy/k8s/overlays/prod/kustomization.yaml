apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: openlaunch-prod

resources:
  - ../../base/web
  - ../../base/api
  - ../../shared

patches:
  # Web ConfigMap
  - target:
      kind: ConfigMap
      name: openlaunch-web-config
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: openlaunch-web-config
      data:
        NEXT_PUBLIC_APP_URL: "https://app.openlaunch.ai"
        OPENLAUNCH_TENANT_ID: "prod"
        OPENLAUNCH_MCP_MODE: "production"
  # Web Deployment
  - target:
      kind: Deployment
      name: openlaunch-web
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: openlaunch-web
      spec:
        replicas: 3
        template:
          spec:
            containers:
              - name: web
                imagePullPolicy: Always
                resources:
                  requests:
                    cpu: 250m
                    memory: 256Mi
                  limits:
                    cpu: "1"
                    memory: 1Gi
  # Web HPA
  - target:
      kind: HorizontalPodAutoscaler
      name: openlaunch-web
    patch: |-
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: openlaunch-web
      spec:
        minReplicas: 3
        maxReplicas: 10
  # Web Ingress
  - target:
      kind: Ingress
      name: openlaunch-web
    patch: |-
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: openlaunch-web
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
          nginx.ingress.kubernetes.io/ssl-redirect: "true"
      spec:
        tls:
          - hosts:
              - app.openlaunch.ai
            secretName: openlaunch-prod-tls
        rules:
          - host: app.openlaunch.ai
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: openlaunch-web
                      port:
                        number: 80

images:
  - name: openlaunch
    newName: ghcr.io/highl0516b-stack/openlaunch
    newTag: prod
  - name: openlaunch-api
    newName: ghcr.io/highl0516b-stack/openlaunch-api
    newTag: prod
