apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openlaunch-web
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - app.openlaunch.ai
      secretName: openlaunch-prod-tls
  rules:
    - host: app.openlaunch.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openlaunch-web
                port:
                  number: 80