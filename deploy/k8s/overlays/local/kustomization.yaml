apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: openlaunch-local

resources:
  - ../../base/web
  - ../../base/api
  - ../../shared

patches:
  - target:
      kind: Deployment
      name: openlaunch-web
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: openlaunch-web
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: web
                imagePullPolicy: IfNotPresent
  - target:
      kind: ConfigMap
      name: openlaunch-web-config
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: openlaunch-web-config
      data:
        NEXT_PUBLIC_APP_URL: "http://openlaunch.local"
        OPENLAUNCH_TENANT_ID: "local"
        OPENLAUNCH_MCP_MODE: "sandbox"

images:
  - name: openlaunch
    newName: openlaunch
    newTag: local
  - name: openlaunch-api
    newName: openlaunch-api
    newTag: local
