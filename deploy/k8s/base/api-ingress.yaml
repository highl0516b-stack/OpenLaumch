apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openlaunch-api
  namespace: openlaunch
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  rules:
    - host: api.openlaunch.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openlaunch-api
                port:
                  number: 80
