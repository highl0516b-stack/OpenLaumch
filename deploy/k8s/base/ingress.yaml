apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openlaunch-web
  namespace: openlaunch
  labels:
    app.kubernetes.io/name: openlaunch
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: openlaunch
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: openlaunch.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openlaunch-web
                port:
                  number: 80