apiVersion: v1
kind: Service
metadata:
  name: openlaunch-web
  namespace: openlaunch
  labels:
    app.kubernetes.io/name: openlaunch
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: openlaunch
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: openlaunch
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP