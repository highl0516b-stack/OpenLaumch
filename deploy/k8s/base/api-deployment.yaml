apiVersion: apps/v1
kind: Deployment
metadata:
  name: openlaunch-api
  namespace: openlaunch
  labels:
    app.kubernetes.io/name: openlaunch-api
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: openlaunch-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openlaunch-api
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: ghcr.io/highl0516b-stack/openlaunch-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4000
          envFrom:
            - configMapRef:
                name: openlaunch-api-config
            - secretRef:
                name: openlaunch-api-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
