apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: openlaunch-web
  labels:
    app.kubernetes.io/name: openlaunch-web
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: openlaunch-web
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
