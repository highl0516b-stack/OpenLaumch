apiVersion: v1
kind: Service
metadata:
  name: openlaunch-api
  namespace: openlaunch-dev
  labels:
    app.kubernetes.io/name: openlaunch
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: openlaunch
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: openlaunch
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP