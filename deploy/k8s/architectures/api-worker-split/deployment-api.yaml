apiVersion: apps/v1
kind: Deployment
metadata:
  name: openlaunch-api
  labels:
    app.kubernetes.io/name: openlaunch
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: openlaunch
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: openlaunch
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openlaunch
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: openlaunch
    spec:
      serviceAccountName: openlaunch
      securityContext:
        fsGroup: 1001
      containers:
        - name: api
          image: openlaunch-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: openlaunch-config
            - secretRef:
                name: openlaunch-secrets
          env:
            - name: PORT
              value: "4000"
          resources:
            requests:
              cpu: 150m
              memory: 192Mi
            limits:
              cpu: 750m
              memory: 768Mi
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
