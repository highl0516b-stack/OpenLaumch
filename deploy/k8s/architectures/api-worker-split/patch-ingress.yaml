apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openlaunch-web
spec:
  rules:
    - host: dev.openlaunch.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: openlaunch-api
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openlaunch-web
                port:
                  number: 80