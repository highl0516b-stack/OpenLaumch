apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openlaunch.fullname" . }}-config
  labels:
    {{- include "openlaunch.labels" . | nindent 4 }}
data:
  NODE_ENV: {{ .Values.config.nodeEnv | quote }}
  PORT: {{ .Values.config.port | quote }}
  NEXT_PUBLIC_APP_URL: {{ .Values.config.nextPublicAppUrl | quote }}
  OPENLAUNCH_TENANT_ID: {{ .Values.config.openlaunchTenantId | quote }}
  OPENLAUNCH_MCP_MODE: {{ .Values.config.openlaunchMcpMode | quote }}
  OPENLAUNCH_ALLOWED_PATHS: {{ .Values.config.openlaunchAllowedPaths | quote }}