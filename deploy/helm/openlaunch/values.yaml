replicaCount: 2

image:
  repository: openlaunch
  tag: local
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""

podSecurityContext:
  fsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: nginx
  host: openlaunch.local
  tls: false
  certManagerClusterIssuer: ""
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"

config:
  nodeEnv: production
  port: 3000
  nextPublicAppUrl: http://openlaunch.local
  openlaunchTenantId: default
  openlaunchMcpMode: sandbox
  openlaunchAllowedPaths: /app

secrets: {}

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCpuUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true

nodeSelector: {}

tolerations: []

affinity: {}